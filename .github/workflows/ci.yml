name: ci

# Big Little Mesh is the fleet's contracts + the frood Go library (with a small python
# side for the MLX/betterproto surface). This is Big Little Mesh's own CI and the canonical gate
# the rest of the fleet vendors from. Go builds and tests on ubuntu; the MLX runtime
# is not exercised here.
#
# This gates the GO side, the GEN-DRIFT check (committed gen must match a fresh
# `buf generate` with the pinned toolchain), and the PYTHON side (ruff + the docstring
# ban on hand-written python; the generated gen/ tree is exempt).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt (no diffs allowed)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "these files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  gen-drift:
    # Committed gen must match a fresh `buf generate` with the PINNED toolchain --
    # stale or hand-edited gen is how outages ship. Toolchain: buf 1.71.0,
    # protoc-gen-go v1.36.11, protoc-gen-fsm built from cmd/ at this commit, and the
    # remote python plugins pinned in buf.gen.yaml. Needs network to buf.build for the
    # remote python plugins.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0
          # authenticate the buf-release lookup so it isn't throttled by the shared
          # runner IP's unauthenticated GitHub API rate limit (flaked the gate otherwise).
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install the pinned codegen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install ./cmd/protoc-gen-fsm
          go install ./cmd/protoc-gen-swift-codable
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Regenerate
        run: buf generate

      - name: Fail on drift
        run: |
          if [ -n "$(git status --porcelain -- gen/)" ]; then
            echo "::error::committed gen differs from a fresh buf generate; run 'buf generate' and commit gen/"
            git status --porcelain -- gen/
            git --no-pager diff -- gen/ | head -200
            exit 1
          fi
          echo "gen is in sync with the contracts"

  python:
    # Big Little Mesh's hand-written python gate: ruff + the docstring ban + pytest. The generated
    # gen/ tree is exempt (not ours to restyle) and lives outside python/; the bounce
    # checker skips .venv. Tests get gen/ on the path via python/conftest.py.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync (dev group)
        working-directory: python
        run: uv sync --group dev

      - name: Lint (ruff)
        working-directory: python
        run: uv run ruff check .

      - name: Bounce docstrings (standards §4; gen/ exempt)
        run: python3 tools/lint/no_docstrings.py python

      - name: Test (pytest)
        working-directory: python
        run: uv run pytest
