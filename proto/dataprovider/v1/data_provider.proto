syntax = "proto3";

// Package dataprovider.v1 is a mesh data contract modeled on Uber's Schemaless
// (the interface, not the distributed system). See proto/dataprovider/v1/README.md.
package dataprovider.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Cell is the smallest entity in a DataProvider: an immutable JSON value addressed by
// (row_key, column) and versioned by ref_key. The latest cell for a (row_key, column)
// is the one with the highest ref_key. A cell is never mutated once written -- a new
// value is a new cell at a higher ref_key, never an edit of the old one.
message Cell {
  // row_key is the entity identifier -- a UUID.
  string row_key = 1;
  // column names the field within the row.
  string column = 2;
  // ref_key is the version; the latest cell for (row_key, column) is the highest ref_key.
  int64 ref_key = 3;
  // body is the JSON value the cell carries.
  google.protobuf.Struct body = 4;
  // created_at is when the cell was written. Cells are immutable, so this never changes.
  google.protobuf.Timestamp created_at = 5;
}

// GetRequest fetches one specific cell version: the cell at (row_key, column, ref_key).
message GetRequest {
  string namespace = 1;
  string row_key = 2;
  string column = 3;
  int64 ref_key = 4;
}

// GetResponse carries the requested cell. found is how a read says "no such cell":
// a miss is found=false with no body, not an error -- the call still succeeds.
message GetResponse {
  Cell cell = 1;
  bool found = 2;
}

// GetLatestRequest fetches the latest cell for (row_key, column) -- the highest ref_key.
message GetLatestRequest {
  string namespace = 1;
  string row_key = 2;
  string column = 3;
}

// GetLatestResponse carries the latest cell. found is how a read says "no such cell":
// a miss is found=false with no body, not an error -- the call still succeeds.
message GetLatestResponse {
  Cell cell = 1;
  bool found = 2;
}

// PutRequest appends a cell. The caller supplies ref_key (the version); writes are
// append-only, so a Put never overwrites an existing cell -- it adds one. A Put at an
// existing (row_key, column, ref_key) is rejected if the body differs -- immutability
// wins; re-Putting the identical cell is a no-op (idempotent retry).
message PutRequest {
  string namespace = 1;
  string row_key = 2;
  string column = 3;
  int64 ref_key = 4;
  google.protobuf.Struct body = 5;
}

// PutResponse echoes the coordinates of the appended cell.
message PutResponse {
  string row_key = 1;
  string column = 2;
  int64 ref_key = 3;
}

// QueryRequest is the "request keys with meta" path: a lookup over a secondary index
// defined on the cells' JSON fields. The index is eventually consistent -- it trails the
// append log. predicates are matched against the indexed fields. shard_hint is optional:
// Schemaless mandates a shard key on a query; this contract does not.
message QueryRequest {
  string namespace = 1;
  string index = 2;
  map<string, google.protobuf.Value> predicates = 3;
  // shard_hint is provisional: an implementation-specific routing hint, not a contract
  // guarantee. It may move to a transport header later.
  string shard_hint = 4;
  uint32 limit = 5;
}

// QueryResponse returns the cells matching the query.
message QueryResponse {
  repeated Cell rows = 1;
  // next_page_token is reserved for pagination -- no behavior yet. It is present so the
  // field number is claimed and Query is not locked into a single page.
  string next_page_token = 2;
}

// DataProvider is the mesh's append-only, immutable cell store. Any service that
// satisfies this contract is a DataProvider. Reads return cells directly; writes are
// append-only and idempotent (the caller supplies ref_key, so re-issuing the same Put
// adds nothing); the query path is a secondary index over the cells' JSON fields and is
// eventually consistent. The contract models the Schemaless interface, not its
// distributed system -- sharding and partitioning are an implementer's concern, not the
// wire's.
service DataProvider {
  // Get returns one specific cell version, addressed by (row_key, column, ref_key).
  // A miss is GetResponse.found=false, not an error.
  rpc Get(GetRequest) returns (GetResponse);
  // GetLatest returns the highest-ref_key cell for (row_key, column).
  // A miss is GetLatestResponse.found=false, not an error.
  rpc GetLatest(GetLatestRequest) returns (GetLatestResponse);
  // Put appends a cell. Append-only and idempotent: the caller supplies ref_key.
  rpc Put(PutRequest) returns (PutResponse);
  // Query looks up cells by predicates over a secondary index (eventually consistent).
  rpc Query(QueryRequest) returns (QueryResponse);
}
