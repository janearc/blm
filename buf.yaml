# buf module config for Big Little Mesh's contracts. The protos here are the single source
# of truth; Go (and Python via betterproto) are generated from them, never
# hand-written. See buf.gen.yaml for the generation plugins.
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  # dataprovider.v1's service is named for the contract role ("a DataProvider"), not
  # suffixed "Service". That is deliberate, so SERVICE_SUFFIX is excepted for this one
  # file only -- the gate stays fully STANDARD for every other contract and rule.
  ignore_only:
    SERVICE_SUFFIX:
      - proto/dataprovider/v1/data_provider.proto
breaking:
  use:
    - FILE
