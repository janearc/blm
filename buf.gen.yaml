# Code generation from Big Little Mesh's contracts. Managed mode retargets every proto's
# go_package to Big Little Mesh's module so generated Go lands under gen/go/... with the right
# import paths, without each .proto hard-coding it. Go today; betterproto Python
# is added next (Max: pydantic ergonomics, protobuf wire); Rust the day we want it.
# Generated code IS committed here (unlike services that gitignore gen/) because
# frood is imported as a library -- consumers go get it, they don't regen.
version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/janearc/big-little-mesh/gen/go
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  # protoc-gen-fsm (local, in cmd/) emits the bento lifecycle harness from each *State
  # enum: a Handlers interface (one method per active state) + a qmuntal/stateless
  # machine that dispatches and auto-emits. Built via `go install ./cmd/protoc-gen-fsm`.
  - local: protoc-gen-fsm
    out: gen/go
    opt:
      - paths=source_relative
      - lang=go
  # Official protobuf Python (protocolbuffers/python via buf's remote plugin):
  # stable, Google-maintained, no abandoned-beta dependency. Classic protobuf
  # message classes -- the contract is the guardrail, not pydantic validation.
  # The Confluent-SR framing is added around the payload by the emit layer, same
  # as Go. Matches kafka-svc's generator.
  - remote: buf.build/protocolbuffers/python:v35.1
    out: gen/python
  - remote: buf.build/protocolbuffers/pyi:v35.1
    out: gen/python
  # protoc-gen-fsm again, this time emitting the Python harness (transitions) -- parity
  # with the Go one, dispatching the same named handlers for the same states.
  - local: protoc-gen-fsm
    out: gen/python
    opt:
      - paths=source_relative
      - lang=python
  # protoc-gen-swift-codable (local, in cmd/) emits plain Swift Codable structs +
  # String enums for the packages the on-device provider consumes (model.v1,
  # sidecar.v1), so Swift speaks protojson with no SwiftProtobuf dependency. Built
  # via `go install ./cmd/protoc-gen-swift-codable`; other packages are skipped.
  - local: protoc-gen-swift-codable
    out: gen/swift
    opt:
      - paths=source_relative
